name: Build & Upload APK

# À copier dans le repo de ton projet Android Studio (pas le projet web Lovable).
# Build l'APK release signé à chaque push sur main, puis l'envoie dans le bucket
# "apks" de Lovable Cloud (Supabase Storage). La page /download du jeu prendra
# automatiquement le fichier le plus récent.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK & upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # --- Signature release ---
      # Décode le keystore base64 (secret KEYSTORE_BASE64) dans app/release.keystore
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          ls -lh app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Aucun APK trouvé sous app/build/outputs/apk/release/"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=MyTaxiWorldTycoon.apk" >> "$GITHUB_OUTPUT"

      # --- Upload via endpoint Lovable (recommandé) ---
      # UPLOAD_URL : ex. https://junkyard-empire-sim.lovable.app/api/public/upload-apk
      # UPLOAD_TOKEN : token partagé (même valeur que côté Lovable Cloud secrets)
      - name: Upload APK to Lovable
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        run: |
          set -e
          echo "Uploading $APK_PATH -> $UPLOAD_URL?name=$APK_NAME"
          HTTP_CODE=$(curl -sS -o /tmp/up.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${UPLOAD_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK_PATH}" \
            "${UPLOAD_URL}?name=${APK_NAME}")
          echo "HTTP $HTTP_CODE"
          cat /tmp/up.json || true
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Upload failed"
            exit 1
          fi
          echo "✅ APK uploaded — la page /download le servira automatiquement."

      - name: Upload APK as workflow artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14
