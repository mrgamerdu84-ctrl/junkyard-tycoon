name: Build & Upload APK (Debug)

# Workflow simplifié : build DEBUG (pas de signature, pas de keystore).
# Tu n'as besoin que de 2 secrets GitHub :
#   UPLOAD_URL  → https://junkyard-empire-sim.lovable.app/api/public/upload-apk
#   UPLOAD_TOKEN → même valeur que côté Lovable Cloud secrets

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK & upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Aucun APK debug trouvé sous app/build/outputs/apk/debug/"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=MyTaxiWorldTycoon-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK to Lovable
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        run: |
          set -e
          echo "Uploading $APK_PATH -> $UPLOAD_URL?name=$APK_NAME"
          HTTP_CODE=$(curl -sS -o /tmp/up.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${UPLOAD_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK_PATH}" \
            "${UPLOAD_URL}?name=${APK_NAME}")
          echo "HTTP $HTTP_CODE"
          cat /tmp/up.json || true
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Upload failed"
            exit 1
          fi
          echo "✅ APK uploaded — la page /download le servira automatiquement."

      - name: Upload APK as workflow artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

