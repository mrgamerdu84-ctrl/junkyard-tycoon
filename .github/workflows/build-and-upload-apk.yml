name: Build & Upload APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK & upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Prepare Capacitor webDir stub
        run: |
          mkdir -p dist
          mkdir -p android/app/src/main/assets
          cat > dist/index.html <<'EOF'
          <!doctype html><html><head><meta charset="utf-8"><title>Junky City Empire</title><meta http-equiv="refresh" content="0; url=https://junkyard-empire-sim.lovable.app"></head><body>Loading…</body></html>
          EOF

      - name: Sync Android project
        run: npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: true # Correction du warning ici

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Aucun APK debug trouvé sous android/app/build/outputs/apk/debug/"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=JunkyCityEmpire-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: JunkyCityEmpire-debug
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14
